# Apache Virtual Host Configuration for Image Recognition App
# Place this in your XAMPP's httpd-vhosts.conf file

<VirtualHost *:80>
    ServerName image-recognition.local
    DocumentRoot "C:/xampp/htdocs/image-recognition"
    
    # For URL rewriting and access to Flask app
    <Directory "C:/xampp/htdocs/image-recognition">
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
    
    # Proxy requests to Flask application
    ProxyPass / http://localhost:5000/
    ProxyPassReverse / http://localhost:5000/
    
    # Error logs
    ErrorLog "logs/image-recognition-error.log"
    CustomLog "logs/image-recognition-access.log" combined
</VirtualHost>

# --------------------------------------------------
# Installation instructions:
# 1. Add the line "127.0.0.1 image-recognition.local" to your hosts file
#    (C:\Windows\System32\drivers\etc\hosts on Windows)
#    (/etc/hosts on Linux/Mac)
# 
# 2. Enable mod_proxy and mod_proxy_http in XAMPP:
#    Uncomment these lines in httpd.conf:
#    LoadModule proxy_module modules/mod_proxy.so
#    LoadModule proxy_http_module modules/mod_proxy_http.so
#
# 3. Include this file in httpd-vhosts.conf
#    Add this line to end of httpd-vhosts.conf:
#    Include "conf/extra/image-recognition.conf"
#
# 4. Restart Apache in XAMPP Control Panel