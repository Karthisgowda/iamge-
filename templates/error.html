{% extends "base.html" %}

{% block title %}Error {{ error_code }} - Image Recognition App{% endblock %}

{% block content %}
<div class="container text-center py-5">
    <div class="animate-on-scroll fade-in">
        <svg viewBox="0 0 200 160" xmlns="http://www.w3.org/2000/svg" class="mb-4" style="max-width: 200px; margin: 0 auto;">
            <rect x="40" y="30" width="120" height="100" rx="10" fill="#212529" stroke="#6c757d" stroke-width="2"/>
            <text x="100" y="90" font-size="40" text-anchor="middle" fill="#dc3545">{{ error_code }}</text>
            <line x1="60" y1="110" x2="140" y2="110" stroke="#6c757d" stroke-width="2"/>
        </svg>
        
        <h1 class="display-1 fw-bold text-danger">{{ error_code }}</h1>
        <h2 class="mb-4">{{ message }}</h2>
        <p class="lead mb-5">Sorry, something went wrong. Please try again or return to the home page.</p>
        
        <a href="{{ url_for('home') }}" class="btn btn-primary btn-lg">
            <i class="fas fa-home me-2"></i> Return Home
        </a>
    </div>
</div>
{% endblock %}
